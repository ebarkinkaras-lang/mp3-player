<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Futuristic MP3 Player - A stunning web-based audio player with real-time spectrum visualization">
    <title>Futuristic MP3 Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container">
        <!-- Electron drag region -->
        <div class="drag-region" id="dragRegion"></div>
        <!-- Reflection effect -->
        <div class="player-reflection"></div>
        
        <!-- Top Navigation Bar -->
        <div class="top-bar">
            <div class="nav-arrows">
                <button class="nav-btn" id="navPrev" title="Previous Page">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M14 8L10 12L14 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="nav-btn" id="navNext" title="Next Page">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                        <path d="M10 8L14 12L10 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <div class="nav-links">
                <button class="nav-link active" data-tab="player" id="tabPlayer">PLAYER</button>
                <button class="nav-link" data-tab="playlist" id="tabPlaylist">PLAYLIST</button>
                <button class="nav-link" data-tab="equalizer" id="tabEqualizer">EQUALIZER</button>
                <button class="nav-link" data-tab="settings" id="tabSettings">SETTINGS</button>
            </div>
        </div>

        <!-- Main Display Area -->
        <div class="main-display">
            <!-- Album Art -->
            <div class="album-art-container" id="albumArtContainer">
                <div class="album-art" id="albumArt">
                    <svg viewBox="0 0 120 120" class="default-art">
                        <defs>
                            <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
                                <stop offset="100%" stop-color="#0a1628" stop-opacity="0.8"/>
                            </radialGradient>
                        </defs>
                        <circle cx="60" cy="60" r="55" fill="url(#discGrad)" stroke="#00b4ff" stroke-width="1"/>
                        <circle cx="60" cy="60" r="45" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.5"/>
                        <circle cx="60" cy="60" r="35" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.4"/>
                        <circle cx="60" cy="60" r="25" fill="none" stroke="#00b4ff" stroke-width="0.5" opacity="0.3"/>
                        <circle cx="60" cy="60" r="15" fill="none" stroke="#00b4ff" stroke-width="1" opacity="0.6"/>
                        <circle cx="60" cy="60" r="5" fill="#00b4ff" opacity="0.8"/>
                        <!-- Music note -->
                        <path d="M55 35 L55 65 Q55 75 48 75 Q41 75 41 68 Q41 61 48 61 Q52 61 55 63 L55 35 L70 30 L70 55 Q70 65 63 65 Q56 65 56 58 Q56 51 63 51 Q67 51 70 53 L70 30" 
                              fill="#00d4ff" opacity="0.6"/>
                    </svg>
                    <img id="albumImage" src="" alt="Album Art" style="display:none;">
                </div>
                <div class="time-display">
                    <span class="time-label">TIME:</span>
                    <span class="time-value" id="currentTime">00:00</span>
                </div>
            </div>

            <!-- Track Info & Visualizer -->
            <div class="track-info-area">
                <div class="track-name-container">
                    <span class="track-label">TRACK:</span>
                    <span class="track-name" id="trackName">NO TRACK LOADED</span>
                </div>

                <!-- Spectrum Visualizer -->
                <div class="visualizer-container">
                    <canvas id="visualizer" width="420" height="160"></canvas>
                </div>

                <!-- Track Progress -->
                <div class="progress-section">
                    <span class="progress-label">TRACK PROGRESS:</span>
                    <div class="progress-bar-container" id="progressBarContainer">
                        <div class="progress-bar" id="progressBar"></div>
                        <div class="progress-blocks" id="progressBlocks"></div>
                    </div>
                    <div class="time-info">
                        <span id="elapsedTime">00:00</span>
                        <span id="totalTime">00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Playlist Panel (hidden by default) -->
        <div class="panel playlist-panel" id="playlistPanel" style="display:none;">
            <div class="panel-header">
                <h2>PLAYLIST</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="add-files-btn" id="addFolderBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M4 4h6l2 2h8v14H4V4z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        ADD FOLDER
                    </button>
                    <button class="add-files-btn" id="addFilesBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        ADD FILES
                    </button>
                </div>
            </div>
            <div class="playlist-list" id="playlistList">
                <div class="playlist-empty">
                    <p>No tracks loaded</p>
                    <p class="hint">Drag & drop MP3 files or click ADD FILES</p>
                </div>
            </div>
        </div>

        <!-- Equalizer Panel (hidden by default) -->
        <div class="panel eq-panel" id="eqPanel" style="display:none;">
            <div class="panel-header">
                <h2>EQUALIZER</h2>
                <select class="eq-preset-select" id="eqPreset">
                    <option value="flat">Flat</option>
                    <option value="rock">Rock</option>
                    <option value="pop">Pop</option>
                    <option value="jazz">Jazz</option>
                    <option value="classical">Classical</option>
                    <option value="bass">Bass Boost</option>
                    <option value="treble">Treble Boost</option>
                </select>
            </div>
            <div class="eq-sliders" id="eqSliders">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Settings Panel (hidden by default) -->
        <div class="panel settings-panel" id="settingsPanel" style="display:none;">
            <div class="panel-header">
                <h2>SETTINGS</h2>
            </div>
            <div class="settings-list">
                <div class="setting-item theme-setting">
                    <span>Color Theme</span>
                    <div class="theme-picker" id="themePicker">
                        <button class="theme-swatch active" data-theme="blue" title="Cyber Blue" style="--sw-color: #00b4ff;"></button>
                        <button class="theme-swatch" data-theme="red" title="Crimson Red" style="--sw-color: #ff2244;"></button>
                        <button class="theme-swatch" data-theme="green" title="Matrix Green" style="--sw-color: #00ff88;"></button>
                        <button class="theme-swatch" data-theme="purple" title="Neon Purple" style="--sw-color: #aa44ff;"></button>
                        <button class="theme-swatch" data-theme="orange" title="Amber Orange" style="--sw-color: #ff8800;"></button>
                        <button class="theme-swatch" data-theme="pink" title="Hot Pink" style="--sw-color: #ff44aa;"></button>
                        <button class="theme-swatch" data-theme="gold" title="Gold" style="--sw-color: #ffd700;"></button>
                        <button class="theme-swatch" data-theme="teal" title="Teal" style="--sw-color: #00ccaa;"></button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>Visualizer Style</span>
                    <select id="vizStyle">
                        <option value="bars">Bars</option>
                        <option value="wave">Waveform</option>
                        <option value="circular">Circular</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span>Glow Intensity</span>
                    <input type="range" id="glowIntensity" min="0" max="100" value="70">
                </div>
                <div class="setting-item">
                    <span>Auto-play Next</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoPlay" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Shuffle</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="shuffleMode">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span>Repeat</span>
                    <select id="repeatMode">
                        <option value="none">Off</option>
                        <option value="all">Repeat All</option>
                        <option value="one">Repeat One</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="playback-controls">
                <button class="control-btn" id="rewindBtn" title="Rewind">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11 16L3 12L11 8V16Z"/>
                        <path d="M20 16L12 12L20 8V16Z"/>
                    </svg>
                    <span class="btn-label">REWIND</span>
                </button>

                <button class="play-btn" id="playBtn" title="Play/Pause">
                    <div class="play-btn-inner">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                            <path d="M8 5V19L19 12L8 5Z"/>
                        </svg>
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" style="display:none;">
                            <path d="M6 4H10V20H6V4ZM14 4H18V20H14V4Z"/>
                        </svg>
                    </div>
                </button>

                <button class="control-btn" id="forwardBtn" title="Fast Forward">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M13 16L21 12L13 8V16Z"/>
                        <path d="M4 16L12 12L4 8V16Z"/>
                    </svg>
                    <span class="btn-label">F.FORWARD</span>
                </button>
            </div>

            <div class="secondary-controls">
                <button class="small-btn" id="recBtn" title="Record">
                    <div class="rec-dot"></div>
                    <span class="btn-label">REC</span>
                </button>

                <button class="power-btn" id="powerBtn" title="Power">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2V12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M17.66 6.34A8 8 0 1 1 6.34 6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-label">POWER</span>
                </button>

                <button class="small-btn" id="muteBtn" title="Mute">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="volumeIcon">
                        <path d="M11 5L6 9H2V15H6L11 19V5Z"/>
                        <path d="M15.54 8.46C16.48 9.4 17 10.67 17 12C17 13.33 16.48 14.6 15.54 15.54" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M19.07 4.93C20.94 6.8 22 9.34 22 12C22 14.66 20.94 17.2 19.07 19.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="muteIcon" style="display:none;">
                        <path d="M11 5L6 9H2V15H6L11 19V5Z"/>
                        <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span class="btn-label">MUTE</span>
                </button>
            </div>

            <div class="volume-section">
                <div class="volume-bar-container" id="volumeBarContainer">
                    <div class="volume-bar" id="volumeBar"></div>
                    <div class="volume-blocks" id="volumeBlocks"></div>
                </div>
                <span class="volume-label">VOLUME</span>
            </div>
        </div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none;">
    <input type="file" id="folderInput" accept="audio/*" webkitdirectory directory style="display:none;">

    <!-- Drop overlay -->
    <div class="drop-overlay" id="dropOverlay">
        <div class="drop-message">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L12 16M12 16L8 12M12 16L16 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180, 12, 9)"/>
                <path d="M20 16V18C20 19.1 19.1 20 18 20H6C4.9 20 4 19.1 4 18V16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <p>Drop MP3 files here</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
